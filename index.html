<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WiFi Pro">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="WiFi Manager Pro — управление Wi-Fi сетями с AI-анализом">

  <!-- Open Graph / share preview -->
  <meta property="og:title" content="WiFi Manager Pro">
  <meta property="og:description" content="Управление Wi-Fi сетями с AI-анализом">
  <meta property="og:type" content="website">

  <link rel="manifest" href="/manifest.json">

  <!-- Apple Touch Icons (fallback, no real PNG needed for demo) -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234f9eff'/><text y='.9em' font-size='72' x='14'>📡</text></svg>">

  <link rel="stylesheet" href="style.css">
  <title>WiFi Manager Pro</title>
</head>
<body>

<!-- Install Banner -->
<div id="install-banner">
  <div style="font-size:22px">📲</div>
  <div class="install-text">
    <strong>Установить приложение</strong>
    Работает офлайн, без браузера
  </div>
  <button class="btn btn-primary btn-sm" style="width:auto;white-space:nowrap" onclick="installApp()">
    Установить
  </button>
  <button style="background:none;border:none;color:var(--sub);cursor:pointer;font-size:20px;padding:0 4px"
    onclick="document.getElementById('install-banner').classList.remove('visible')">✕</button>
</div>

<div id="app">
  <header class="header">
    <div class="header-brand">
      <div class="header-icon">📡</div>
      <div>
        <div class="header-title">WiFi Manager Pro</div>
        <div class="header-sub">v2.0 · Web Edition</div>
      </div>
    </div>
    <div class="conn-pill" onclick="switchTab('home')">
      <div class="conn-dot"></div>
      <span class="conn-name" id="connName">HomeNetwork_5G</span>
    </div>
  </header>

  <main class="content" id="content">
    <!-- rendered by app.js -->
  </main>

  <nav class="nav" aria-label="Навигация">
    <button class="nav-btn active" data-tab="home" onclick="switchTab('home')" aria-label="Главная">
      <div class="nav-dot"></div>
      <span class="nav-icon">🏠</span>
      <span>Главная</span>
    </button>
    <button class="nav-btn" data-tab="nets" onclick="switchTab('nets')" aria-label="Сети">
      <div class="nav-dot"></div>
      <span class="nav-icon">📶</span>
      <span>Сети</span>
    </button>
    <button class="nav-btn" data-tab="mon" onclick="switchTab('mon')" aria-label="Монитор">
      <div class="nav-dot"></div>
      <span class="nav-icon">📊</span>
      <span>Монитор</span>
    </button>
    <button class="nav-btn" data-tab="prof" onclick="switchTab('prof')" aria-label="Профили">
      <div class="nav-dot"></div>
      <span class="nav-icon">🔑</span>
      <span>Профили</span>
    </button>
    <button class="nav-btn" data-tab="diag" onclick="switchTab('diag')" aria-label="Диагностика">
      <div class="nav-dot"></div>
      <span class="nav-icon">🛠</span>
      <span>Диагност.</span>
    </button>
  </nav>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
